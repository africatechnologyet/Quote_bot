services:
  - type: worker
    name: cobuiltPricequote-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false        # you set this manually in Render dashboard
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
